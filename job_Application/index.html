<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>job application form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="apply_box">
            <h1>Job Application
            <span class="title_small">(web)</span>
            </h1>
            <form action="">
                <div class="form_container">
                    <div class="form_control">
                        <label for="first_name"> First Name </label>
                        <input  
                        id="first_name"
                         name="first_name" 
                         placeholder="Enter First Name..."
                          />
                    </div>
              
                
                    <div class="form_control">
                        <label for="Last_name"> Last Name </label>
                        <input id="Last_name" name="Last_name" placeholder="Enter Last Name..." />
                    </div>
                     <div class="form_control">
                        <label for="email"> Email </label>
                        <input type="email" id="email" name="email" placeholder="Enter Email..."/>
                    </div>
                    <div class="form_control">
                        <label for="job_role"> Email </label>
                        <input type="job_role" id="job_role" name="job_role" placeholder="Enter Job role..."/>
                    </div>
                    <div class="form_control">
                    <label for="job_role">Job Role</label>
                    <select name="job_role" id="job_role">
                       <option value="Select Job Role">Select Job Role</option>
                       <option value="Frontend Developer">Frontend Developer</option>
                       <option value="Backend Developer">Backend Developer</option>
                       <option value="Full Stack Developer">Full Stack Developer</option>
                       <option value="UI UX Designer">UI UX Designer</option>
                    </select>
                    </div>
                      <div class="textarea_control">
                        <label for="adress">Adress</label>
                        <textarea name="adress" id="adress" row="4"  cols="50"></textarea>
                    </div>
                      <div class="form_control">
                        <label for="city"> Last Name </label>
                        <input type="text" id="city" name="city" placeholder="Enter city..."/>
                    </div>
                      <div class="form_control">
                        <label for="pincode"> pincode </label>
                        <input type="number" id="pincode" name="pincode" placeholder="Enter Pincode..."/>
                    </div>
                    <div class="form_control">
                        <label for="date"> Date </label>
                        <input type="date" value="2026-03-03" id="date" name="date" placeholder="Enter date..."/>
                    </div>
                    <div class="form_control">
                        <label for="upload"> Upload your CV </label>
                        <input type="file"  id="date" name="upload" placeholder="Enter upload..."/>
                    </div>
                      </div>
                    <div class="button_container">
                        <button type="submit">Apply Now</button>
                    </div>
                
                 
            </form>
        </div>
    </div>
</body>
</html>
